<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Свиток — идеальное раскрытие</title>
    <style>
        .scroll {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }

        .scroll__left,
        .scroll__right {
            width: 80px;
            height: 300px;
            flex-shrink: 0;
            display: block;
            position: relative;
            z-index: 3;
        }

        /* Контейнер для бумаги */
        .scroll__paper-wrapper {
            display: flex;
            position: relative;
            z-index: 1;
            overflow: hidden;
            width: 25px;                  /* НЕ 0 — это свёрнутый рулон */
            transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .scroll__paper {
            width: 1202px;               /* полная ширина */
            height: 290px;
            display: block;
            flex-shrink: 0;
        }

        /* Раскрытие */
        .scroll:hover .scroll__paper-wrapper {
            width: 1202px;               /* полная ширина */
        }

        /* В начальном состоянии — валики прижаты к рулону */
        .scroll__left {
            margin-right: -15px;
        }

        .scroll__right {
            margin-left: -15px;
        }

        /* При наведении — валики остаются прижатыми к краям */
        .scroll:hover .scroll__left {
            margin-right: -15px;
        }

        .scroll:hover .scroll__right {
            margin-left: -15px;
        }
    </style>
</head>
<body>
    <div class="scroll">
        <img src="1.png" class="scroll__left" alt="">
        <div class="scroll__paper-wrapper">
            <img src="2.png" class="scroll__paper" alt="">
        </div>
        <img src="3.png" class="scroll__right" alt="">
    </div>
</body>
</html>
